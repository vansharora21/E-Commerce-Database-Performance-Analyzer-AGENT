services:
  - type: web
    name: insightai-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 8000
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: LLM_PROVIDER
        value: groq
      # NOTE: Do NOT put secrets (API keys, MongoDB URI) here.
      # Add them securely in the Render Dashboard instead!
